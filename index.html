<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Mech - 艾宾浩斯错题本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        body { background: #121212; font-family: 'Courier Prime', monospace; color: #a1a1aa; touch-action: manipulation; }
        .panel { background: #27272a; border: 4px solid #09090b; box-shadow: 10px 10px 0px #000; }
        .screen { background: #064e3b; box-shadow: inset 0 0 20px #000; position: relative; overflow: hidden; }
        .screen::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%), linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,0,255,0.03)); background-size: 100% 2px, 3px 100%; pointer-events: none; }
        .btn-mechanical { background: #3f3f46; border-bottom: 4px solid #18181b; active:translate-y-1; active:border-b-0; }
        .knob { transition: transform 0.1s linear; touch-action: none; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="w-full max-w-md flex justify-between items-center mb-6 px-2">
        <div class="text-[10px] bg-zinc-800 px-2 py-1 border border-zinc-700 uppercase tracking-widest">
            User: <span id="user-id" class="text-orange-500">GUEST_01</span>
        </div>
        <button onclick="alert('同步中...')" class="text-[10px] text-emerald-500 hover:underline">☁ SYNC DATA</button>
    </div>

    <div class="panel w-full max-w-md p-6 rounded-xl">
        
        <div class="screen h-40 rounded-lg p-4 mb-6 border-2 border-black flex flex-col justify-between">
            <div id="quest-display" class="text-emerald-400 text-sm italic">
                > 系统就绪... <br> > 请选择录入方式或开始复习
            </div>
            <div id="freq-tag" class="self-end text-[10px] text-emerald-700 font-bold uppercase">Ready</div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-8">
            <button onclick="mockInput('Camera')" class="btn-mechanical p-3 rounded text-[10px] flex flex-col items-center">
                <span>📷</span><span>拍照</span>
            </button>
            <button onclick="mockInput('Voice')" class="btn-mechanical p-3 rounded text-[10px] flex flex-col items-center">
                <span>🎙️</span><span>语音</span>
            </button>
            <button onclick="mockInput('Stylus')" class="btn-mechanical p-3 rounded text-[10px] flex flex-col items-center">
                <span>✍️</span><span>手写</span>
            </button>
        </div>

        <div class="flex items-center justify-around mb-8">
            <div id="knob" class="knob w-24 h-24 rounded-full bg-zinc-700 border-4 border-black relative flex justify-center shadow-lg">
                <div class="w-1 h-6 bg-orange-500 rounded-full mt-2"></div>
                <div class="absolute inset-0 flex items-center justify-center opacity-20 text-[8px] rotate-[-90deg]">MAX</div>
            </div>
            <div class="text-right">
                <div class="text-xs text-zinc-500 uppercase">Interval</div>
                <div id="day-val" class="text-3xl font-bold text-orange-500">1</div>
                <div class="text-[10px] text-zinc-600 italic">Next: <span id="next-date">2024-05-21</span></div>
            </div>
        </div>

        <button onclick="saveErrorNote()" class="w-full bg-orange-600 hover:bg-orange-500 text-black font-bold py-4 rounded-lg border-b-4 border-orange-900 active:border-b-0 active:translate-y-1 transition-all uppercase tracking-widest">
            Record Memory (入库)
        </button>
    </div>

    <div class="w-full max-w-md mt-8">
        <h3 class="text-xs font-bold mb-4 text-zinc-500 uppercase tracking-widest">Memory Storage (本地缓存)</h3>
        <div id="list-container" class="space-y-3">
            </div>
    </div>

    <script>
        // --- 核心状态 ---
        let currentDays = 1;
        let rotation = 0;
        const knob = document.getElementById('knob');
        const stages = [1, 2, 4, 7, 15, 30];

        // --- 旋钮逻辑 ---
        let isDragging = false;
        let lastAngle = 0;

        const getAngle = (e) => {
            const rect = knob.getBoundingClientRect();
            const center = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            const client = e.touches ? e.touches[0] : e;
            return Math.atan2(client.clientY - center.y, client.clientX - center.x) * 180 / Math.PI;
        };

        const handleStart = (e) => { isDragging = true; lastAngle = getAngle(e); e.preventDefault(); };
        const handleMove = (e) => {
            if (!isDragging) return;
            const angle = getAngle(e);
            rotation += (angle - lastAngle);
            knob.style.transform = `rotate(${rotation}deg)`;
            lastAngle = angle;
            
            // 计算艾宾浩斯天数 (简化版)
            let index = Math.abs(Math.floor(rotation / 60) % stages.length);
            currentDays = stages[index];
            document.getElementById('day-val').innerText = currentDays;
            updateNextDate();
        };

        knob.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', () => isDragging = false);
        knob.addEventListener('touchstart', handleStart, {passive: false});
        window.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('touchend', () => isDragging = false);

        // --- 功能逻辑 ---
        function updateNextDate() {
            const d = new Date();
            d.setDate(d.getDate() + currentDays);
            document.getElementById('next-date').innerText = d.toISOString().split('T')[0];
        }

        function mockInput(type) {
            const display = document.getElementById('quest-display');
            display.innerHTML = `> [${type}] 模式启动...<br>> 正在捕捉数据...<br>> 请在机器上方操作。`;
            setTimeout(() => {
                display.innerHTML = `> 成功捕捉到新题目!<br>> 类型: 数学错题<br>> 建议复习周期: ${currentDays}天`;
            }, 1000);
        }

        function saveErrorNote() {
            const note = {
                id: Date.now(),
                content: "新录入的错题数据 #" + Math.floor(Math.random()*100),
                interval: currentDays,
                nextReview: document.getElementById('next-date').innerText
            };
            
            // 同步到本地存储 (模拟云端)
            let history = JSON.parse(localStorage.getItem('notes') || '[]');
            history.unshift(note);
            localStorage.setItem('notes', JSON.stringify(history));
            renderList();
            alert("同步成功！已计入艾宾浩斯计划。");
        }

        function renderList() {
            const container = document.getElementById('list-container');
            const history = JSON.parse(localStorage.getItem('notes') || '[]');
            container.innerHTML = history.map(n => `
                <div class="panel p-3 rounded-lg text-xs flex justify-between items-center border border-zinc-700">
                    <div>
                        <div class="text-zinc-300">${n.content}</div>
                        <div class="text-[8px] text-zinc-500 mt-1">NEXT: ${n.nextReview}</div>
                    </div>
                    <div class="bg-orange-900/30 text-orange-500 px-2 py-1 rounded">${n.interval}D</div>
                </div>
            `).join('');
        }

        // 初始化
        updateNextDate();
        renderList();
    </script>
</body>
</html>
